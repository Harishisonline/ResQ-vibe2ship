name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push container image
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/resq/resq:latest \
            --project=${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy resq \
            --image=us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/resq/resq:latest \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=60s \
            --set-env-vars=NEXT_TELEMETRY_DISABLED=1,NODE_ENV=production \
            --set-secrets=GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest \
            --project=${{ vars.GCP_PROJECT_ID }}
